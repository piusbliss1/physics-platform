<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | PhysicsLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Physics<span>Lab</span></a>
      <span id="auth-links"></span>
    </div>
  </nav>
  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card-custom p-5" style="max-width: 450px; width: 100%;">
      <h3 class="text-center mb-4">Login to PhysicsLab</h3>
      <form id="loginForm">
        <div class="mb-3"><label for="email" class="form-label">Email</label><input type="email" class="form-control" id="email" required></div>
        <div class="mb-3"><label for="password" class="form-label">Password</label><input type="password" class="form-control" id="password" required></div>
        <button type="submit" class="btn btn-primary-theme w-100">Login</button>
      </form>
      <p class="mt-3 text-center">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const data = await apiRequest('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'teacher' ? 'teacher-dashboard.html' : 'student-dashboard.html';
      } catch (err) {
        alert('Login failed: ' + err.message);
      }
    });
  </script>
</body>
</html>
