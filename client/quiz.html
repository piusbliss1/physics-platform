<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Physics Quiz - Test your knowledge with multiple-choice questions.">
  <title>Physics Quiz | PhysicsLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .quiz-option {
      border: 2px solid var(--gray-300);
      border-radius: var(--radius);
      padding: 1rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .quiz-option:hover { border-color: var(--secondary); background: var(--gray-50); }
    .quiz-option.selected { border-color: var(--secondary); background: rgba(0,180,216,0.05); }
    .quiz-option.correct { border-color: #28a745; background: #d4edda; }
    .quiz-option.wrong { border-color: #dc3545; background: #f8d7da; }
    .progress { height: 10px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Physics<span>Lab</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><i class="fas fa-bars text-white"></i></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="modules.html">Modules</a></li>
          <li class="nav-item"><a class="nav-link" href="experiments.html">Experiments</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link active" href="quiz.html">Quiz</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <span id="auth-links"></span>
        </ul>
      </div>
    </div>
  </nav>

  <section class="hero-section" style="padding: 4rem 0 3rem;">
    <div class="container text-center"><h1 class="text-white">Physics Challenge Quiz</h1><p class="lead text-white-50">10 questions from all modules. Can you get a perfect score?</p></div>
  </section>

  <main class="container py-4">
    <div class="quiz-container" data-aos="fade-up">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <span class="timer" id="timer">05:00</span>
        <div class="progress flex-grow-1 mx-3"><div class="progress-bar bg-secondary" id="progressBar" style="width:0%"></div></div>
        <span id="questionCount">1/10</span>
      </div>
      <div id="quizCard" class="card-custom p-4">
        <h5 id="questionText"></h5>
        <div id="optionsContainer" class="mt-3"></div>
        <div class="d-flex justify-content-between mt-4">
          <button id="prevBtn" class="btn btn-outline-secondary" disabled>Previous</button>
          <button id="nextBtn" class="btn btn-primary-theme">Next</button>
        </div>
      </div>
      <div id="resultContainer" class="text-center mt-4 d-none">
        <h3>Your Score: <span id="scoreDisplay">0</span>/10</h3>
        <p id="resultMessage"></p>
        <button class="btn btn-accent" onclick="location.reload()">Retake Quiz</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container text-center"><p>2026 PhysicsLab. Group 4.</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Quiz data
    const questions = [
      { question: "What is the SI unit of force?", options: ["Joule", "Newton", "Watt", "Pascal"], correct: 1 },
      { question: "Which law states F = ma?", options: ["First", "Second", "Third", "Zeroth"], correct: 1 },
      { question: "Friction always acts in the direction __________ the motion.", options: ["Same as", "Opposite to", "Perpendicular to", "At 45 degrees to"], correct: 1 },
      { question: "Momentum is product of mass and __________.", options: ["Acceleration", "Velocity", "Force", "Time"], correct: 1 },
      { question: "Unit of electric current is?", options: ["Volt", "Ohm", "Ampere", "Watt"], correct: 2 },
      { question: "Ohm's law relates V, I and __________.", options: ["Power", "Resistance", "Energy", "Charge"], correct: 1 },
      { question: "In a series circuit, the current is __________ through all components.", options: ["Different", "Same", "Zero", "Variable"], correct: 1 },
      { question: "Sound travels fastest in __________.", options: ["Air", "Water", "Vacuum", "Steel"], correct: 3 },
      { question: "The angle of incidence equals the angle of __________.", options: ["Refraction", "Reflection", "Diffraction", "Dispersion"], correct: 1 },
      { question: "Light bends when entering a different medium due to __________.", options: ["Reflection", "Refraction", "Absorption", "Scattering"], correct: 1 }
    ];

    let currentQ = 0;
    let userAnswers = new Array(questions.length).fill(-1);
    let timer;
    let timeLeft = 300; // 5 minutes

    const questionEl = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const timerEl = document.getElementById('timer');
    const progressBar = document.getElementById('progressBar');
    const questionCountEl = document.getElementById('questionCount');
    const resultContainer = document.getElementById('resultContainer');
    const quizCard = document.getElementById('quizCard');

    function startTimer() {
      timer = setInterval(() => {
        timeLeft--;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerEl.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          finishQuiz();
        }
      }, 1000);
    }

    function loadQuestion(index) {
      const q = questions[index];
      questionEl.textContent = q.question;
      optionsContainer.innerHTML = '';
      q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'quiz-option';
        if (userAnswers[index] === i) div.classList.add('selected');
        div.textContent = opt;
        div.addEventListener('click', () => selectOption(index, i, div));
        optionsContainer.appendChild(div);
      });
      prevBtn.disabled = index === 0;
      nextBtn.textContent = index === questions.length - 1 ? 'Finish' : 'Next';
      questionCountEl.textContent = `${index+1}/${questions.length}`;
      progressBar.style.width = ((index+1)/questions.length)*100 + '%';
    }

    function selectOption(qIndex, optIndex, element) {
      userAnswers[qIndex] = optIndex;
      document.querySelectorAll('.quiz-option').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');
      // Auto-advance after a short delay? Optional
    }

    nextBtn.addEventListener('click', () => {
      if (currentQ === questions.length - 1) {
        finishQuiz();
      } else {
        currentQ++;
        loadQuestion(currentQ);
      }
    });
    prevBtn.addEventListener('click', () => {
      if (currentQ > 0) {
        currentQ--;
        loadQuestion(currentQ);
      }
    });

    function finishQuiz() {
      clearInterval(timer);
      let score = 0;
      questions.forEach((q, i) => { if (userAnswers[i] === q.correct) score++; });
      document.getElementById('scoreDisplay').textContent = score;
      document.getElementById('resultMessage').textContent = score >= 8 ? 'Excellent! You are a physics star.' : score >= 5 ? 'Good effort. Keep studying.' : 'Needs improvement. Review the modules.';
      quizCard.classList.add('d-none');
      resultContainer.classList.remove('d-none');
    }

    // Initialize
    loadQuestion(0);
    startTimer();
  </script>
</body>
</html>
